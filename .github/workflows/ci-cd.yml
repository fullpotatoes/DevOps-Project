name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ─── 1. BUILD & HEALTH CHECK ───────────────────────────────
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t devops-project:${{ github.sha }} .

      - name: Start services
        run: |
          docker compose up -d
          sleep 10  # laisse le temps aux services de démarrer

      - name: Health check - Web
        run: |
          curl --fail --retry 5 --retry-delay 3 http://localhost:8080 || exit 1

      - name: Health check - MySQL
        run: |
          docker compose exec -T db mysqladmin ping -h localhost -u root -proot || exit 1

      - name: Stop services
        if: always()
        run: docker compose down

  # ─── 2. PUSH IMAGE SUR DOCKER HUB ─────────────────────────
  push-image:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/devops-project:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/devops-project:${{ github.sha }}

  # ─── 3. DÉPLOIEMENT SUR VPS ────────────────────────────────
  deploy:
    needs: push-image
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/devops-project
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f