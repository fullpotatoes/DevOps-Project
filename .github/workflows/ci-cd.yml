name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t devops-project:${{ github.sha }} .

      - name: Start services
        run: |
          docker compose up -d
          sleep 15  # Wait for services to be ready

      - name: Health check - Web
        run: |
          curl --fail --retry 5 --retry-delay 3 http://localhost:8080 || exit 1
          echo "✓ Web service is healthy"

      - name: Health check - Database
        run: |
          docker compose exec -T db mysqladmin ping -h localhost -u root -proot || exit 1
          echo "✓ Database service is healthy"

      - name: Stop services
        if: always()
        run: docker compose down

  push-image:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/ecotri:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/ecotri:${{ github.sha }}

  deploy:
    needs: push-image
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/ecotri
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
            echo "✓ Deployment successful"