version: '3.8'

services:
  web:
    build: .
    container_name: ecotri-web
    ports:
      - "8080:80"
    volumes:
      - ./php:/var/www/html:cached
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_NAME: gestion_collectes
      DB_USER: root
      DB_PASSWORD: root
    restart: unless-stopped

  db:
    image: mysql:8.0
    container_name: ecotri-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: gestion_collectes
    volumes:
      - db_data:/var/lib/mysql
      - ./sql/gestion_collectes.sql:/docker-entrypoint-initdb.d/gestion_collectes.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  phpmyadmin:
    image: phpmyadmin:5.2
    container_name: ecotri-phpmyadmin
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: root
    depends_on:
      - db

volumes:
  db_data: